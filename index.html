<!DOCTYPE HTML>
<html lang="zh-CN">
	<head>
		<title>生活部文化有限公司 | SHENGHUOBU MEDIA</title>
        <link rel="icon" href="assets/picture/专业团队.jpg" type="image/jpeg">
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/aerial_assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/aerial_assets/css/noscript.css" /></noscript>
        <style>
            /* 1. 登录框整体容器 */
            .input-group {
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(255, 255, 255, 0.1); /* 保持轻微的透明感 */
                border-radius: 4px;
                padding: 5px 15px;
                margin: 20px auto;
                max-width: 400px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                transition: border-color 0.3s ease;
            }

            .input-group:focus-within {
                border-color: rgba(255, 255, 255, 0.5);
            }

            /* 2. 模拟下拉框容器 */
            .custom-select {
                position: relative;
                width: 140px;
                cursor: pointer;
                font-size: 0.9em;
                text-align: left;
            }

            /* 3. 角色显示文字 - 强制纯白 */
            #selectedDisplay {
                color: #ffffff !important;
                opacity: 1 !important;
                font-weight: 500;
                text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3); /* 防止背景过亮看不清 */
            }

            /* 4. 下拉触发器及箭头 */
            .select-trigger {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding-right: 5px;
            }

            .select-trigger .arrow {
                border: solid #ffffff; /* 箭头也用纯白 */
                border-width: 0 2px 2px 0;
                display: inline-block;
                padding: 3px;
                transform: rotate(45deg);
                transition: transform 0.3s;
                opacity: 0.8;
            }

            .custom-select.open .arrow {
                transform: rotate(-135deg);
            }

            /* 5. 下拉选项列表 - 深色磨砂质感 */
            .select-options {
                position: absolute;
                top: calc(100% + 12px);
                left: -15px;
                width: calc(100% + 30px);
                background: rgba(15, 15, 15, 0.85); /* 深色背景确保白色文字清晰 */
                backdrop-filter: blur(15px);
                border: 1px solid rgba(255, 255, 255, 0.15);
                border-radius: 8px;
                display: none;
                z-index: 100;
                max-height: 250px;
                overflow-y: auto;
                box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            }

            .custom-select.open .select-options {
                display: block;
                animation: selectAppear 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            }

            /* 6. 单个选项样式 */
            .option {
                padding: 12px 20px;
                color: #ffffff !important;
                opacity: 1 !important;
                transition: all 0.2s ease;
                text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
            }

            /* 选项悬停效果：白底黑字 */
            .option:hover {
                background: rgba(255, 255, 255, 0.95) !important;
                color: #000000 !important;
                text-shadow: none;
                font-weight: bold;
            }

            /* 7. 分割线 - 提高亮度 */
            .divider {
                width: 1px;
                height: 20px;
                background: rgba(255, 255, 255, 0.6);
                margin: 0 15px;
            }

            /* 8. 姓名输入框 - 强制纯白 & 修复白底 */
            input[type="text"] {
                background: transparent !important;
                border: none;
                color: #ffffff !important; /* 强制纯白文字 */
                opacity: 1 !important;
                outline: none;
                flex-grow: 1;
                text-align: left;
                box-shadow: none !important;
                font-size: 0.9em;
            }

            /* 修复浏览器自动填充导致的白底蓝字问题 */
            input:-webkit-autofill,
            input:-webkit-autofill:hover,
            input:-webkit-autofill:focus,
            input:-webkit-autofill:active  {
                -webkit-text-fill-color: #ffffff !important;
                transition: background-color 5000s ease-in-out 0s;
                box-shadow: 0 0 0px 1000px transparent inset !important;
            }

            /* 9. 进入按钮 */
            .login-btn {
                margin-top: 20px;
                letter-spacing: 2px;
                font-weight: bold;
                background: #ffffff !important;
                color: #000000 !important;
                padding: 0 40px;
                line-height: 3em;
                height: 3em;
                border-radius: 4px;
                display: inline-block;
                text-decoration: none;
                transition: all 0.3s ease;
            }

            .login-btn:hover {
                transform: scale(1.05);
                background: #dddddd !important;
            }

            /* 10. 动画与滚动条 */
            @keyframes selectAppear {
                from { opacity: 0; transform: translateY(-10px) scale(0.95); }
                to { opacity: 1; transform: translateY(0) scale(1); }
            }

            .select-options::-webkit-scrollbar { width: 4px; }
            .select-options::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

            #header nav ul li a { cursor: pointer; }
        </style>
	</head>
	<body class="is-preload">
		<div id="wrapper">
			<div id="bg"></div>
			<div id="overlay"></div>
			<div id="main">

				<header id="header">
						<h1>生活部</h1>
						<p>SHENGHUOBU CULTURE MEDIA &nbsp;&bull;&nbsp; 2022-2026</p>

						<div class="input-group">
                            <div class="custom-select" id="customSelect">
                                <div class="select-trigger">
                                    <span id="selectedDisplay">老总</span>
                                    <i class="arrow"></i>
                                </div>
                                <div class="select-options">
                                    <div class="option" data-value="ceo">老总</div>
                                    <div class="option" data-value="foreman">打工人头头</div>
                                    <div class="option" data-value="deputy">打工人负头头</div>
                                    <div class="option" data-value="secretary">秘书长</div>
                                    <div class="option" data-value="partner">公司合伙人</div>
                                    <div class="option" data-value="scientist">研发部科学家</div>
                                    <div class="option" data-value="hr">人事部经理</div>
                                    <div class="option" data-value="security">安保分队队长</div>
                                    <div class="option" data-value="teacher">老师</div>
                                    <div class="option" data-value="worker">一线工人</div>
                                    <div class="option" data-value="sales">世一流销售</div>
                                    <div class="option" data-value="guest">游客</div>
                                </div>
                                <input type="hidden" id="roleSelect" value="ceo">
                            </div>
							<div class="divider"></div>
							<input type="text" id="userInput" placeholder="输入成员姓名" onkeydown="if(event.keyCode==13) doLogin()">
						</div>

						<a href="javascript:void(0);" class="login-btn" onclick="doLogin()">ACCESS / 进入</a>

					</header>

				<footer id="footer">
						<span class="copyright">&copy; SHENGHUOBU MEDIA.2022-2026</span>
					</footer>

			</div>
		</div>

		<script>
			window.onload = function() { document.body.classList.remove('is-preload'); }
			window.ontouchmove = function() { return false; }
			window.onorientationchange = function() { document.body.scrollTop = 0; }

			async function doLogin() {
				const name = document.getElementById('userInput').value.trim();
				const role = document.getElementById('roleSelect').value;

				if (name === "") {
					alert("请输入有效身份信息");
					return;
				}

				try {
					const response = await fetch('assets/text/user.json');
					if (!response.ok) throw new Error("无法读取用户配置文件");

					const users = await response.json();

					if (users[role] && users[role].names.includes(name)) {
						window.location.href = users[role].page;
					}
					else if (role === "guest" && name !== "") {
						window.location.href = "main.html?role=" + role + "&name=" + encodeURIComponent(name);
					}
					else {
						const errorMsgs = [
							"暗号错误",
							"口令对不上，再想想？",
							"身份验证失败，系统怀疑你是卧底",
							"暗号错误！报上正确的名号",
							"对不上暗号，无法放行",
                            "你怕不是狼人吧"
						];
						alert(errorMsgs[Math.floor(Math.random() * errorMsgs.length)]);
					}
				} catch (error) {
					console.error(error);
					alert("系统初始化失败，请稍后再试");
				}
			}


            document.addEventListener('DOMContentLoaded', () => {
                const customSelect = document.getElementById('customSelect');
                const trigger = customSelect.querySelector('.select-trigger');
                const options = customSelect.querySelectorAll('.option');
                const hiddenInput = document.getElementById('roleSelect');
                const display = document.getElementById('selectedDisplay');

                // 点击开关下拉列表
                trigger.addEventListener('click', (e) => {
                    customSelect.classList.toggle('open');
                    e.stopPropagation();
                });

                // 选择选项
                options.forEach(opt => {
                    opt.addEventListener('click', () => {
                        const value = opt.getAttribute('data-value');
                        const text = opt.innerText;

                        display.innerText = text;
                        hiddenInput.value = value;
                        customSelect.classList.remove('open');
                    });
                });

                // 点击页面其他地方关闭下拉框
                document.addEventListener('click', () => {
                    customSelect.classList.remove('open');
                });
            });
		</script>
	</body>
</html>
