<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生活部文化有限公司 | SHENGHUOBU MEDIA</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #0a0a0a; color: white; display: flex;
            justify-content: center; align-items: center; height: 100vh;
        }
        .login-card {
            text-align: center; border: 1px solid #222; padding: 60px 40px;
            background: rgba(255,255,255,0.03); backdrop-filter: blur(10px);
        }
        h1 { letter-spacing: 12px; font-weight: 300; margin: 0; font-size: 2.5em; }
        .eng-title { color: #666; font-size: 10px; letter-spacing: 4px; margin-bottom: 50px; margin-top: 10px; }
        input {
            background: transparent; border: none; border-bottom: 1px solid #444;
            color: white; padding: 12px; width: 280px; text-align: center;
            font-size: 16px; outline: none; transition: 0.3s;
        }
        input:focus { border-bottom-color: #fff; }
        button {
            display: block; margin: 40px auto 0; background: #fff; color: #000;
            border: none; padding: 12px 50px; cursor: pointer; font-weight: bold;
            letter-spacing: 2px; transition: 0.3s;
        }
        button:hover { background: #ccc; transform: scale(1.05); }
        .copyright { position: absolute; bottom: 30px; font-size: 9px; color: #333; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>生活部</h1>
        <div class="eng-title">SHENGHUOBU CULTURE MEDIA</div>
        <input type="text" id="userInput" placeholder="ENTER MEMBER NAME / 输入成员姓名" onkeydown="if(event.keyCode==13) doLogin()">
        <button onclick="doLogin()">ACCESS / 进入</button>
    </div>

    <div class="copyright">
        © 2022-2026 SHENGHUOBU CULTURE MEDIA CO., LTD.
    </div>

    <script>
        function doLogin() {
            const name = document.getElementById('userInput').value.trim();
            // 这里你可以预设跳转逻辑
            if (name === "全体成员" || name === "生活部") {
                window.location.href = "main.html"; // 之后我们要写的正式主页
            } else if (name !== "") {
                // 如果你想给特定的人做专属页面，可以这样：
                // window.location.href = "members/" + name + ".html";
                window.location.href = "main.html";
            } else {
                alert("请输入有效身份信息");
            }
        }
    </script>
</body>
</html>
