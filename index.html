<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生活部文化有限公司 | SHENGHUOBU MEDIA</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #0a0a0a; color: white; display: flex;
            justify-content: center; align-items: center; height: 100vh;
        }
        .login-card {
            text-align: center; border: 1px solid #222; padding: 60px 40px;
            background: rgba(255,255,255,0.03); backdrop-filter: blur(10px);
        }
        h1 { letter-spacing: 12px; font-weight: 300; margin: 0; font-size: 2.5em; }
        .eng-title { color: #666; font-size: 10px; letter-spacing: 4px; margin-bottom: 50px; margin-top: 10px; }

        /* 输入区域容器 - 使用 flex 布局 */
        .input-group {
            display: flex;
            align-items: center;
            gap: 0;
            border-bottom: 1px solid #444;
            width: 340px;
            margin: 0 auto;
            transition: border-color 0.3s;
        }
        .input-group:focus-within {
            border-bottom-color: #fff;
        }

        /* 下拉框样式 */
        select {
            background: transparent;
            border: none;
            color: #fff;
            padding: 12px 8px 12px 0;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            letter-spacing: 1px;
            appearance: none;
            -webkit-appearance: none;
            text-align: left;
        }
        /* 自定义下拉箭头 */
        .select-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .select-wrapper::after {
            content: '▾';
            color: #666;
            font-size: 10px;
            margin-left: 8px;
            pointer-events: none;
        }
        select option {
            background: #1a1a1a;
            color: #fff;
            padding: 10px;
        }
        /* 分隔线 */
        .divider {
            width: 1px;
            height: 20px;
            background: #444;
            margin: 0 12px;
        }

        /* 输入框样式调整 */
        input {
            background: transparent; border: none;
            color: white; padding: 12px 0; flex: 1;
            font-size: 16px; outline: none; text-align: left;
        }
        input::placeholder { color: #666; }

        button {
            display: block; margin: 40px auto 0; background: #fff; color: #000;
            border: none; padding: 12px 50px; cursor: pointer; font-weight: bold;
            letter-spacing: 2px; transition: 0.3s;
        }
        button:hover { background: #ccc; transform: scale(1.05); }
        .copyright { position: absolute; bottom: 30px; font-size: 9px; color: #333; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>生活部</h1>
        <div class="eng-title">SHENGHUOBU CULTURE MEDIA</div>

        <div class="input-group">
            <div class="select-wrapper">
                <select id="roleSelect">
                    <option value="ceo">老总</option>
                    <option value="foreman">打工人头头</option>
                    <option value="deputy">打工人负头头</option>
                    <option value="secretary">秘书长</option>
                    <option value="partner">公司合伙人</option>
                    <option value="scientist">研发部科学家</option>
                    <option value="hr">人事部经理</option>
                    <option value="security">安保分队队长</option>
                    <option value="teacher">老师</option>
                    <option value="worker">一线工人</option>
                    <option value="sales">世一流销售</option>
                    <option value="guest">游客</option>
                </select>
            </div>
            <div class="divider"></div>
            <input type="text" id="userInput" placeholder="输入成员姓名" onkeydown="if(event.keyCode==13) doLogin()">
        </div>

        <button onclick="doLogin()">ACCESS / 进入</button>
    </div>

    <div class="copyright">
        © 2022-2026 SHENGHUOBU CULTURE MEDIA CO., LTD.
    </div>

    <script>
        function doLogin() {
            const name = document.getElementById('userInput').value.trim();
            const role = document.getElementById('roleSelect').value;

            if (name === "") {
                alert("请输入有效身份信息");
                return;
            }


            if (role === "ceo" && name === "信愿" || name ==="小信"|| name==="小·真正的老总·吉祥物·信" || name==="生活部"||name==="老总") {
                window.location.href = "ceo.html";
            }
            else if (role==="foreman" && name==="姜文雨" || name==="姜姜" || name==="吃瓜大王" || name==="猪策划" || name==="姜" || name==="部长" ){
                window.location.href = "jiang.html";
            }
            else if (role==="deputy" && name==="孔祥冰" || name==="冰冰" || name==="冰狗" || name==="血狼头号铁粉" || name==="冰"||name==="Pilgrimage" ){
                window.location.href = "bingo.html";
            }
            else if (role==="secretary" && name==="杨硕" || name==="楠桶" || name==="硕宝" || name==="此群坐镇骑士长" || name==="硕" ){
                window.location.href = "sure.html";
            }
            else if (role==="partner" && name==="高赓" || name==="歌神" || name==="量子力学传承人" || name==="Aron" || name==="赓" ){
                window.location.href = "geng.html";
            }
            else if (role==="scientist" && name==="兰艳芝" || name==="兰陈儿" || name==="成毅" || name==="莲花楼楼主夫人" || name==="姑" ){
                window.location.href = "gu.html";
            }
            else if (role==="hr" && name==="王子瑶" || name==="电竞迷妹" || name==="阿贡面包" || name==="奇妙能力帅哥" || name==="瑶" ){
                window.location.href = "yao.html";
            }
            else if (role==="hr" && name==="玄海强" || name==="生活部梅西" || name==="L1chaPup6" || name==="史上第0位100级强者" || name==="强" ){
                window.location.href = "yao.html";
            }
            else if (role==="teacher" && name==="玄洪远" || name==="刘欢老师" || name==="章若楠男朋友" || name==="骑三轮车卖地瓜" || name==="远" ){
                window.location.href = "liuhuan.html";
            }
            else if (role==="worker" && name==="邬小钢" || name==="电竞达人" || name==="Nivana" || name==="187体育生" || name==="钢" ){
                window.location.href = "gang.html";
            }
            else if (role==="sales" && name==="丁俊熙" || name==="小丁" || name==="恋爱大王" || name==="冰冰爱凯神" || name==="丁" ) {
                window.location.href = "ding.html";
            }
            else if (role==="guest" && name !=="") {
                // 可以传递角色参数到主页
                window.location.href = "main.html?role=" + role + "&name=" + encodeURIComponent(name);
            }
        }
    </script>
</body>
</html>
