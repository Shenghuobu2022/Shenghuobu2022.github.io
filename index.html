<!DOCTYPE HTML>
<html lang="zh-CN">
	<head>
		<title>生活部文化有限公司 | SHENGHUOBU MEDIA</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/aerial_assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/aerial_assets/css/noscript.css" /></noscript>
		<style>
			/* 融合原有业务逻辑的自定义样式 */
			.input-group {
				display: flex;
				align-items: center;
				justify-content: center;
				background: rgba(255, 255, 255, 0.1);
				border-radius: 4px;
				padding: 5px 15px;
				margin: 20px auto;
				max-width: 400px;
				border: 1px solid rgba(255, 255, 255, 0.2);
			}

			select {
				background: transparent;
				border: none;
				color: #fff;
				font-size: 0.9em;
				outline: none;
				cursor: pointer;
				appearance: none;
				-webkit-appearance: none;
				padding-right: 10px;
			}

			select option {
				background: #222;
				color: #fff;
			}

			.divider {
				width: 1px;
				height: 20px;
				background: rgba(255, 255, 255, 0.3);
				margin: 0 15px;
			}

			input[type="text"] {
				background: transparent;
				border: none;
				color: #fff;
				outline: none;
				flex-grow: 1;
				text-align: left;
				box-shadow: none !important;
			}

			#header nav ul li a {
				cursor: pointer;
			}

			.login-btn {
				margin-top: 20px;
				letter-spacing: 2px;
				font-weight: bold;
				background: #fff !important;
				color: #000 !important;
				padding: 0 30px;
				line-height: 3em;
				height: 3em;
				border-radius: 4px;
				display: inline-block;
				text-decoration: none;
				transition: all 0.3s ease;
			}

			.login-btn:hover {
				transform: scale(1.05);
				background: #ddd !important;
			}
		</style>
	</head>
	<body class="is-preload">
		<div id="wrapper">
			<div id="bg"></div>
			<div id="overlay"></div>
			<div id="main">

				<header id="header">
						<h1>生活部</h1>
						<p>SHENGHUOBU CULTURE MEDIA &nbsp;&bull;&nbsp; 2022-2026</p>

						<div class="input-group">
							<div class="select-wrapper">
								<select id="roleSelect">
									<option value="ceo">老总</option>
									<option value="foreman">打工人头头</option>
									<option value="deputy">打工人负头头</option>
									<option value="secretary">秘书长</option>
									<option value="partner">公司合伙人</option>
									<option value="scientist">研发部科学家</option>
									<option value="hr">人事部经理</option>
									<option value="security">安保分队队长</option>
									<option value="teacher">老师</option>
									<option value="worker">一线工人</option>
									<option value="sales">世一流销售</option>
									<option value="guest">游客</option>
								</select>
							</div>
							<div class="divider"></div>
							<input type="text" id="userInput" placeholder="输入成员姓名" onkeydown="if(event.keyCode==13) doLogin()">
						</div>

						<a href="javascript:void(0);" class="login-btn" onclick="doLogin()">ACCESS / 进入</a>

						<nav>
							<ul>
								<li><a href="#" class="icon brands fa-twitter"><span class="label">Twitter</span></a></li>
								<li><a href="#" class="icon brands fa-github"><span class="label">Github</span></a></li>
								<li><a href="#" class="icon solid fa-envelope"><span class="label">Email</span></a></li>
							</ul>
						</nav>
					</header>

				<footer id="footer">
						<span class="copyright">&copy; SHENGHUOBU MEDIA. Design: <a href="http://html5up.net">HTML5 UP</a>.</span>
					</footer>

			</div>
		</div>

		<script>
			window.onload = function() { document.body.classList.remove('is-preload'); }
			window.ontouchmove = function() { return false; }
			window.onorientationchange = function() { document.body.scrollTop = 0; }

			async function doLogin() {
				const name = document.getElementById('userInput').value.trim();
				const role = document.getElementById('roleSelect').value;

				if (name === "") {
					alert("请输入有效身份信息");
					return;
				}

				try {
					const response = await fetch('assets/text/user.json');
					if (!response.ok) throw new Error("无法读取用户配置文件");

					const users = await response.json();

					if (users[role] && users[role].names.includes(name)) {
						window.location.href = users[role].page;
					}
					else if (role === "guest" && name !== "") {
						window.location.href = "main.html?role=" + role + "&name=" + encodeURIComponent(name);
					}
					else {
						const errorMsgs = [
							"暗号错误",
							"口令对不上，再想想？",
							"身份验证失败，系统怀疑你是卧底",
							"暗号错误！报上正确的名号",
							"对不上暗号，无法放行"
						];
						alert(errorMsgs[Math.floor(Math.random() * errorMsgs.length)]);
					}
				} catch (error) {
					console.error(error);
					alert("系统初始化失败，请稍后再试");
				}
			}
		</script>
	</body>
</html>
